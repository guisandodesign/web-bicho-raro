        <!-- Fonts -->

        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css">

    </head>

    <body>

        
<header class="header">
    <div class="hamburger" id="openMenu">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="nav">
      <a href="index.html"><img src="media/img/logo.negro.png" class="logo"></a>
    </nav>

<div class="right">

    <div class="cart-btn" id="openCart">
        🛒 <span id="cartCount"></span>
    </div>
</div>
</header>

<div class="cart-overlay" id="cartOverlay"></div>

<div class="cart-panel" id="cartPanel">
    <button class="cart-close" id="closeCart">&times;</button>

    <h2>Tu carrito</h2>

    <div id="cartItems"></div>

    <div class="cart-footer">
        <p>Total: <span id="cartTotal">0.00</span> €</p>
        <button class="checkout-btn">Comprar</button>
    </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- MENÚ LATERAL -->
<div class="side-menu" id="sideMenu">
    <button class="close" id="closeMenu">&times;</button>

    <a href="index.html">Inicio</a>
    <a href="index.html">Qué es Bicho Raro</a>
    <a href="#about.html">Sobre el proyecto</a>
    <a href="index.html">Tienda</a>
    <a href="index.html">Contacto</a>
</div>


 <!-- CHECKOUT -->
        <main class="checkout-page">
            <h1 class="checkout-title">Checkout</h1>

            <section class="checkout-grid">
            <aside class="checkout-summary">
                <h2>Resumen del pedido</h2>
                <div id="checkout-items" class="checkout-items"></div>
                <div class="checkout-totals">
                <div class="row">
                    <span>Subtotal</span>
                    <span id="checkout-subtotal">0€</span>
                </div>

                <div class="row">
                    <span>Envío</span>
                    <span id="checkout-shipping">0€</span>
                </div>

                <div class="row total">
                    <span>Total</span>
                    <span id="checkout-total">0€</span>
                </div>
                </div>

                <p id="checkout-empty" class="checkout-empty" style="display:none;">
                Tu carrito está vacío. Vuelve al catálogo para añadir productos.
                </p>

                <a href="catalogo.html" class="checkout-backlink">Seguir comprando</a>
            </aside>

            <!---- Formulario ---->
            <section class="checkout-form">
                <h2>Datos de envío</h2>

                <form id="checkout-form">
                <div class="field">
                    <label>Nombre y apellidos</label>
                    <input type="text" id="ship-name" required>
                </div>

                <div class="field">
                    <label>Email</label>
                    <input type="email" id="ship-email" required>
                </div>

                <div class="field">
                    <label>Dirección</label>
                    <input type="text" id="ship-address" required>
                </div>

                <div class="field two">
                    <div>
                        <label>Ciudad</label>
                        <input type="text" id="ship-city" required>
                    </div>
                    <div>
                        <label>Código postal</label>
                        <input type="text" id="ship-zip" required>
                    </div>
                </div>

                <div class="field">
                    <label>País</label>
                    <input type="text" id="ship-country" value="España" required>
                </div>

                <h2>Pago</h2>

                <div class="field">
                    <label>Número de tarjeta</label>
                    <input type="text" id="card-number" placeholder="1234 5678 9012 3456" required>
                </div>

                <div class="field two">
                    <div>
                    <label>Caducidad</label>
                    <input type="text" id="card-exp" placeholder="MM/AA" required>
                    </div>
                    <div>
                    <label>CVV</label>
                    <input type="text" id="card-cvv" placeholder="123" required>
                    </div>
                </div>

                <button type="submit" id="place-order" class="place-order-btn">
                    Pagar y realizar pedido
                </button>
                </form>
            </section>
            </section>
        </main>


<footer class="site-footer-container">

    <img src="media/img/foto footer.jpg" alt="Fondo Footer" class="footer-bg-img">

    <!-- El contenido (iconos y créditos) -->

            <a href="#">BICHO RARO</a>

                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-regular fa-envelope"></i></a>
            </div>
        </div>
        
        <div class="footer-right">
            <p>made by <span>GUISANDO DISEÑO</span></p>
        </div>
    </div>
</footer>
